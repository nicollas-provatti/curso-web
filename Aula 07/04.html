<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesclagem de Células</title>
  <style>
    body {
      font-family: sans-serif;
    }

    table, td {
      border: 1px solid black;
    }

    table {
      width: 600px;
      height: 600px;
      border-collapse: collapse;
    }

    td {
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Mesclagem de Células</h1>
  <table>
    <tr>
      <td colspan="2">A</td>
      <td rowspan="2">B</td>
      <!-- <td>C</td> -->
    </tr>

    <tr>
      <td>D</td>
      <td>E</td>
      <!-- <td>F</td> -->
    </tr>

    <tr>
      <td colspan="2" rowspan="2">G</td>
      <!-- <td>H</td> -->
      <td>I</td>
    </tr>
    
    <tr>
      <!-- <td>J</td> -->
      <!-- <td>K</td> -->
      <td>L</td>
    </tr>
  </table>
</body>
</html>
